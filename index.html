<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budzatja Invoice System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Budzatja Invoice System</h1>
        <p>Professional Invoice Management</p>
    </header>

    <div class="dashboard">
        <div class="card">
            <h2>Total Invoices</h2>
            <h3 id="invoiceCount">0</h3>
        </div>

        <div class="card">
            <h2>Total Revenue</h2>
            <h3>R0.00</h3>
        </div>

        <div class="card">
            <h2>Customers</h2>
            <h3>0</h3>
        </div>
    </div>

    <div class="actions-bar">
        <button id="newInvoice" class="btn primary-btn">Create New Invoice</button>
    </div>

    <section class="invoice-form">
        <h2>Create Invoice</h2>

        <div class="form-row">
            <div class="form-group">
                <label for="customerName">Customer Name</label>
                <input type="text" id="customerName" placeholder="e.g. Mavrican (Pty) Ltd">
            </div>
            <div class="form-group">
                <label for="invoiceDate">Invoice Date</label>
                <input type="date" id="invoiceDate">
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Booked Date</th>
                    <th>Service / Description</th>
                    <th>Guests (Pax)</th>
                    <th>Price per Person</th>
                    <th>Total</th>
                    <th class="no-print" style="width: 50px;">Action</th>
                </tr>
            </thead>

            <tbody id="invoiceBody">
                <tr>
                    <td><input type="date" class="booked-date"></td>
                    <td><input type="text" placeholder="e.g. KNP Full Day Safari"></td>
                    <td><input type="number" class="qty" value="1" min="1"></td>
                    <td><input type="number" class="price" value="0" min="0"></td>
                    <td class="lineTotal">R0.00</td>
                    <td class="no-print"></td>
                </tr>
            </tbody>
        </table>

        <div class="form-actions">
            <button id="addRow" class="btn secondary-btn">+ Add Service</button>
        </div>

        <div class="total-display">
            <h2>Grand Total: <span id="grandTotal">R0.00</span></h2>
        </div>

        <div style="text-align: right; margin-top: 20px;">
            <button id="generateInvoice" class="btn action-btn">
                Generate & Save Invoice
            </button>
        </div>
    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
