<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budzatja Invoice System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Budzatja Invoice System</h1>
        <p>Professional Invoice Management</p>
    </header>

    <div class="dashboard">

        <div class="card">
            <h2>Total Invoices</h2>
            <h3 id="invoiceCount">0</h3>
        </div>

        <div class="card">
            <h2>Total Revenue</h2>
            <h3>R0.00</h3>
        </div>

        <div class="card">
            <h2>Customers</h2>
            <h3>0</h3>
        </div>

    </div>

    <button id="newInvoice">Create Invoice</button>

</div>

<script src="script.js"></script>

</body>
</html>
<section class="invoice-form">

    <h2>Create Invoice</h2>

    <input type="text" id="customerName" placeholder="Customer Name">

    <input type="date" id="invoiceDate">

    <table>
        <thead>
            <tr>
                <th>Service</th>
                <th>Guests</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody id="invoiceBody">
            <tr>
                <td><input type="text" placeholder="Transfer"></td>
                <td><input type="number" class="qty" value="1"></td>
                <td><input type="number" class="price" value="0"></td>
                <td class="lineTotal">R0.00</td>
            </tr>
        </tbody>
    </table>

    <button id="addRow">+ Add Service</button>

    <h2>Total: <span id="grandTotal">R0.00</span></h2>

    <button id="generateInvoice">
        Generate Invoice
    </button>

</section>
